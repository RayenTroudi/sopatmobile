name: Distribute Android release

on:
  push:
    branches:
      - main

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter build apk --release

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          npx firebase-tools@latest appdistribution:distribute \
            build/app/outputs/flutter-apk/app-release.apk \
            --app 1:1056701373497:android:38c81331a8d12f75a741e8 \
            --groups "${{ vars.APP_DISTRIBUTION_GROUPS }}" \
            --release-notes "Automated build from ${{ github.sha }}"
